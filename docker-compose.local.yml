services:
  teslamate-dashboard:
    image: mvmrik/teslamate-dashboard:latest
    container_name: teslamate-dashboard
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: 4001
      DATABASE_URL: postgres://teslamate:TmDb@2026!Secure@127.0.0.1:5432/teslamate
      TIMEZONE: Europe/Sofia
    volumes:
      - ./data:/data
