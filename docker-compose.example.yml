version: "3.8"

# Add this service to your existing TeslaMate docker-compose.yml
# The only required change is setting DATABASE_URL to point to your teslamate DB.

services:
  teslamate-dashboard:
    image: ghcr.io/yourusername/teslamate-dashboard:latest
    # Or build locally:
    # build: ./teslamate-dashboard
    restart: unless-stopped
    ports:
      - "4000:3000"          # Access at http://your-server:4000
    environment:
      # ── Required ──────────────────────────────────────────────────────────────
      DATABASE_URL: postgres://teslamate:YOUR_DB_PASSWORD@database:5432/teslamate

      # ── Optional ──────────────────────────────────────────────────────────────
      TIMEZONE: Europe/Sofia        # Your local timezone for charge time display
      PORT: 3000                    # Internal port (do not change unless needed)

    volumes:
      - teslamate-dashboard-data:/data   # Persists tariff settings & widget layout

    # Connect to the same network as your TeslaMate & PostgreSQL containers
    networks:
      - teslamate

volumes:
  teslamate-dashboard-data:

networks:
  teslamate:
    external: true   # Use the existing network name from your TeslaMate setup
